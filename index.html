<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boat Customizer - Three.js</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=routine" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
      }
    }
  </script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #22232a; }
    
    #info {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      color: white; background: rgba(0,0,0,0.8); padding: 12px 20px;
      border-radius: 30px; z-index: 100; font-size: 14px; pointer-events: none;
    }

    /* Menu Lateral de Controles */
    .controls-container {
      position: absolute; top: 20px; left: 20px; z-index: 101;
      display: flex; flex-direction: column; gap: 12px;
    }

    .btn-ui {
      padding: 10px 15px; border-radius: 12px; border: none;
      background: rgba(255,255,255,0.9); color: #333; font-size: 14px;
      cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-ui:hover { background: #fff; transform: translateY(-2px); }

    /* Seletor de Cores (Quadrados) */
    .color-picker {
      display: none; grid-template-columns: repeat(4, 1fr); gap: 8px;
      background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px;
      backdrop-filter: blur(10px); margin-top: 5px;
    }
    .color-box {
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2); transition: transform 0.2s;
    }
    .color-box:hover { transform: scale(1.1); border-color: white; }

    .active { display: grid !important; }
    .hidden { opacity: 0; visibility: hidden; }
  </style>
</head>
<body>

  <div id="info">Carregando Barco...</div>

  <div class="controls-container">
    <button id="toggleBg" class="btn-ui">
      <span class="material-symbols-outlined">routine</span>
      Tema
    </button>
    
    <button id="btnSofas" class="btn-ui">🛋️ Cor dos Sofás</button>
    <div id="pickerSofas" class="color-picker">
        <div class="color-box" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-box" style="background: #333333;" data-color="#333333"></div>
        <div class="color-box" style="background: #a52a2a;" data-color="#a52a2a"></div>
        <div class="color-box" style="background: #1e3a5f;" data-color="#1e3a5f"></div>
    </div>

    <button id="btnExterno" class="btn-ui">🛥️ Cor do Casco (Externo)</button>
    <div id="pickerExterno" class="color-picker">
        <div class="color-box" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-box" style="background: #d4af37;" data-color="#d4af37"></div>
        <div class="color-box" style="background: #000080;" data-color="#000080"></div>
        <div class="color-box" style="background: #555555;" data-color="#555555"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const LIGHT_BG = 0x7a8a9a;
    const DARK_BG = 0x22232a;
    let isDark = true;
    scene.background = new THREE.Color(DARK_BG);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 8, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    let objSofas, objExterno;

    const loader = new GLTFLoader();
    loader.load('model7.glb', (gltf) => {
      const model = gltf.scene;
      
      model.traverse((child) => {
        if (child.isMesh) {
          // Identifica os objetos específicos
          if (child.name === "arch48_003_obj_05") objSofas = child;
          if (child.name === "arch48_003_obj_04") objExterno = child;
          
          // Otimização de material
          if(child.material) child.material.side = THREE.DoubleSide;
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      scene.add(model);
      
      document.getElementById('info').classList.add('hidden');
    });

    // Lógica de Interface
    function setupColorPicker(btnId, pickerId, targetObj) {
      const btn = document.getElementById(btnId);
      const picker = document.getElementById(pickerId);

      btn.addEventListener('click', () => {
        picker.classList.toggle('active');
      });

      picker.querySelectorAll('.color-box').forEach(box => {
        box.addEventListener('click', () => {
          const colorHex = box.getAttribute('data-color');
          if (targetObj) {
            // Clona material para não afetar outras partes por erro
            targetObj.material = targetObj.material.clone();
            targetObj.material.color.set(colorHex);
          } else {
            console.warn("Objeto não encontrado no modelo ainda.");
          }
        });
      });
    }

    // Inicializa os seletores para cada peça
    setupColorPicker('btnSofas', 'pickerSofas', null); // Vinculado via delay ou verificação
    setupColorPicker('btnExterno', 'pickerExterno', null);

    // Ajuste dinâmico para garantir que os objetos carregados sejam vinculados
    const checkInterval = setInterval(() => {
        if(objSofas || objExterno) {
            setupColorPicker('btnSofas', 'pickerSofas', objSofas);
            setupColorPicker('btnExterno', 'pickerExterno', objExterno);
            clearInterval(checkInterval);
        }
    }, 500);

    // Alternar Fundo
    document.getElementById('toggleBg').addEventListener('click', () => {
      isDark = !isDark;
      scene.background.set(isDark ? DARK_BG : LIGHT_BG);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
