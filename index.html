<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boat Customizer Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
      }
    }
  </script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background: #22232a; }
    
    #info {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      color: white; background: rgba(0,0,0,0.8); padding: 12px 20px;
      border-radius: 30px; z-index: 100; font-size: 14px; pointer-events: none;
    }

    .controls-container {
      position: absolute; top: 20px; left: 20px; z-index: 101;
      display: flex; flex-direction: column; gap: 8px;
    }

    .btn-ui {
      padding: 12px 18px; border-radius: 10px; border: none;
      background: white; color: #333; font-size: 14px;
      cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 240px;
    }

    /* Estilo específico para garantir que o ícone apareça */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }

    .color-picker {
      display: none; grid-template-columns: repeat(4, 1fr);
      gap: 10px; background: rgba(255,255,255,0.9);
      padding: 12px; border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      margin-bottom: 10px;
    }

    .color-picker.show { display: grid; }

    .color-box {
      width: 40px; height: 40px; border-radius: 6px; cursor: pointer;
      border: 2px solid rgba(0,0,0,0.1); transition: transform 0.2s;
    }
    .color-box:hover { transform: scale(1.1); border-color: #000; }

    .input-custom { width: 100%; height: 35px; cursor: pointer; border: none; margin-top: 5px; grid-column: span 4; }
  </style>
</head>
<body>

  <div id="info">Carregando Barco...</div>

  <div class="controls-container">
    <button id="toggleBg" class="btn-ui">
      <span class="material-symbols-outlined">routine</span> Tema do Fundo
    </button>
    
    <button id="btnSofas" class="btn-ui">
        <span class="material-symbols-outlined">chair</span> Cor dos Sofás
    </button>
    <div id="pickerSofas" class="color-picker">
        <div class="color-box" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-box" style="background: #333333;" data-color="#333333"></div>
        <div class="color-box" style="background: #be9b7b;" data-color="#be9b7b"></div>
        <div class="color-box" style="background: #1e3a5f;" data-color="#1e3a5f"></div>
        <input type="color" id="customSofas" class="input-custom" value="#ffffff">
    </div>

    <button id="btnExterno" class="btn-ui">
        <span class="material-symbols-outlined">directions_boat</span> Cor do Casco
    </button>
    <div id="pickerExterno" class="color-picker">
        <div class="color-box" style="background: #ffffff;" data-color="#ffffff"></div>
        <div class="color-box" style="background: #002366;" data-color="#002366"></div>
        <div class="color-box" style="background: #cc0000;" data-color="#cc0000"></div>
        <div class="color-box" style="background: #222222;" data-color="#222222"></div>
        <input type="color" id="customExterno" class="input-custom" value="#ffffff">
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const LIGHT_BG = 0x7a8a9a;
    const DARK_BG = 0x22232a;
    let isDark = true;
    scene.background = new THREE.Color(DARK_BG);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12, 10, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- ILUMINAÇÃO ESTILO SKETCHFAB (RESTAURADA) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 2.0);
    hemisphereLight.position.set(0, 50, 0);
    scene.add(hemisphereLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
    keyLight.position.set(5, 10, 7);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 1.5);
    fillLight.position.set(-5, 5, -5);
    scene.add(fillLight);

    const backLight = new THREE.DirectionalLight(0xffffff, 1.0);
    backLight.position.set(0, 5, -10);
    scene.add(backLight);

    const pointLight1 = new THREE.PointLight(0xffffff, 1.5, 50);
    pointLight1.position.set(10, 10, 10);
    scene.add(pointLight1);
    // -----------------------------------------------

    let objSofas = null;
    let objExterno = null;

    function applyColor(object, hex) {
        if (!object) return;
        object.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.color.set(hex);
                child.material.needsUpdate = true;
            }
        });
    }

    const loader = new GLTFLoader();
    loader.load('model7.glb', (gltf) => {
      const model = gltf.scene;
      model.traverse((child) => {
        if (child.name === "arch48_003_obj_05") objSofas = child;
        if (child.name === "arch48_003_obj_04") objExterno = child;
      });

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      scene.add(model);
      document.getElementById('info').style.display = 'none';
    });

    // Eventos de Interface
    document.getElementById('btnSofas').addEventListener('click', () => {
        document.getElementById('pickerSofas').classList.toggle('show');
        document.getElementById('pickerExterno').classList.remove('show');
    });

    document.getElementById('btnExterno').addEventListener('click', () => {
        document.getElementById('pickerExterno').classList.toggle('show');
        document.getElementById('pickerSofas').classList.remove('show');
    });

    document.querySelectorAll('.color-box').forEach(box => {
        box.addEventListener('click', (e) => {
            const color = e.target.getAttribute('data-color');
            const parentId = e.target.parentElement.id;
            if (parentId === 'pickerSofas') applyColor(objSofas, color);
            else if (parentId === 'pickerExterno') applyColor(objExterno, color);
        });
    });

    document.getElementById('customSofas').addEventListener('input', (e) => applyColor(objSofas, e.target.value));
    document.getElementById('customExterno').addEventListener('input', (e) => applyColor(objExterno, e.target.value));

    document.getElementById('toggleBg').addEventListener('click', () => {
      isDark = !isDark;
      scene.background.set(isDark ? DARK_BG : LIGHT_BG);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
