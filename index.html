<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Boat Customizer Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
      }
    }
  </script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background: #7a8a9a; }
    
    #info {
      position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
      color: white; background: rgba(0,0,0,0.8); padding: 12px 20px;
      border-radius: 30px; z-index: 100; font-size: 14px; pointer-events: none;
    }

    .controls-container { 
        position: absolute; top: 20px; left: 20px; z-index: 101; 
        display: flex; flex-direction: column; gap: 8px; 
        max-height: 80vh; overflow-y: auto; padding-right: 10px;
    }

    /* Botões com Hover Preto Moderno */
    .btn-ui {
      padding: 12px 18px; border-radius: 10px; border: none;
      background: white; color: #333; font-size: 14px;
      cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 260px;
      transition: all 0.3s ease;
    }
    .btn-ui:hover {
      background: #1a1a1a; 
      color: white;
    }

    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    
    .color-picker { 
        display: none; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 8px; 
        background: rgba(255,255,255,0.95); 
        padding: 15px; 
        border-radius: 10px; 
        margin-bottom: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        width: 230px;
    }
    .color-picker.show { display: grid; }
    
    /* Quadrados com contorno cinza e preto no hover */
    .color-box { 
        width: 45px; height: 45px; border-radius: 8px; 
        cursor: pointer; 
        border: 2px solid #d1d1d1;
        box-sizing: border-box;
        transition: border 0.2s ease;
    }
    .color-box:hover {
        border: 2px solid #000000;
    }

    .custom-label { grid-column: span 4; font-size: 11px; font-weight: bold; margin-top: 8px; color: #666; text-align: center; }
    .input-custom { width: 100%; height: 35px; cursor: pointer; border: none; grid-column: span 4; background: none; padding: 0; }

    #footer {
        position: fixed; bottom: 15px; width: 100%;
        color: rgba(255,255,255,0.9);
        text-align: center; font-size: 12px;
        z-index: 100; pointer-events: none;
        font-weight: bold;
    }

    .controls-container::-webkit-scrollbar { width: 4px; }
    .controls-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
  </style>
</head>
<body>

  <div id="info">Carregando Modelo...</div>

  <div class="controls-container">
    <button id="toggleBg" class="btn-ui"><span class="material-symbols-outlined">routine</span> Alterar Fundo</button>
    
    <button id="btnSofas" class="btn-ui"><span class="material-symbols-outlined">chair</span> Cores do Estofado</button>
    <div id="pickerSofas" class="color-picker">
        <div class="color-box" style="background: #f5f5f0;" data-color="#f5f5f0"></div> <div class="color-box" style="background: #e3dac9;" data-color="#e3dac9"></div> 
        <div class="color-box" style="background: #d2b48c;" data-color="#d2b48c"></div> 
        <div class="color-box" style="background: #bc987e;" data-color="#bc987e"></div> 
        <div class="color-box" style="background: #8e735b;" data-color="#8e735b"></div> 
        <div class="color-box" style="background: #4b3621;" data-color="#4b3621"></div> 
        <div class="color-box" style="background: #c0c0c0;" data-color="#c0c0c0"></div> 
        <div class="color-box" style="background: #708090;" data-color="#708090"></div> 
        <div class="color-box" style="background: #2f4f4f;" data-color="#2f4f4f"></div> 
        <div class="color-box" style="background: #191970;" data-color="#191970"></div> 
        <div class="color-box" style="background: #000000;" data-color="#000000"></div> 
        <div class="color-box" style="background: #004d4d;" data-color="#004d4d"></div> <div class="custom-label">COR PERSONALIZADA:</div>
        <input type="color" id="customSofas" class="input-custom" value="#ffffff">
    </div>

    <button id="btnExterno" class="btn-ui"><span class="material-symbols-outlined">directions_boat</span> Cores do Casco</button>
    <div id="pickerExterno" class="color-picker">
        <div class="color-box" style="background: #f0f8ff;" data-color="#f0f8ff"></div> <div class="color-box" style="background: #e5e4e2;" data-color="#e5e4e2"></div>
        <div class="color-box" style="background: #002366;" data-color="#002366"></div>
        <div class="color-box" style="background: #001233;" data-color="#001233"></div>
        <div class="color-box" style="background: #1c3d5a;" data-color="#1c3d5a"></div>
        <div class="color-box" style="background: #5a5e6b;" data-color="#5a5e6b"></div>
        <div class="color-box" style="background: #2c3e50;" data-color="#2c3e50"></div>
        <div class="color-box" style="background: #1a1a1a;" data-color="#1a1a1a"></div>
        <div class="color-box" style="background: #2d5a27;" data-color="#2d5a27"></div>
        <div class="color-box" style="background: #4a0404;" data-color="#4a0404"></div>
        <div class="color-box" style="background: #daa520;" data-color="#daa520"></div>
        <div class="color-box" style="background: #464e51;" data-color="#464e51"></div> <div class="custom-label">COR PERSONALIZADA:</div>
        <input type="color" id="customExterno" class="input-custom" value="#ffffff">
    </div>
  </div>

  <div id="footer">Feito por Vitoria Gabriele</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const LIGHT_BG = 0x7a8a9a; 
    const DARK_BG = 0x22232a;
    let isDark = false; 
    scene.background = new THREE.Color(LIGHT_BG);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12, 10, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0; 
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2); 
    keyLight.position.set(5, 10, 7);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.7);
    fillLight.position.set(-5, 5, 2);
    scene.add(fillLight);

    let objSofas, objExterno;

    function applyColor(object, hex) {
        if (!object) return;
        object.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.color.set(hex);
            }
        });
    }

    const loader = new GLTFLoader();
    loader.load('model7.glb', (gltf) => {
      const model = gltf.scene;
      model.traverse((child) => {
        if (child.name === "arch48_003_obj_05") objSofas = child;
        if (child.name === "arch48_003_obj_04") objExterno = child;
      });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      scene.add(model);
      document.getElementById('info').style.display = 'none';
    });

    document.getElementById('btnSofas').onclick = () => {
        document.getElementById('pickerSofas').classList.toggle('show');
        document.getElementById('pickerExterno').classList.remove('show');
    };
    document.getElementById('btnExterno').onclick = () => {
        document.getElementById('pickerExterno').classList.toggle('show');
        document.getElementById('pickerSofas').classList.remove('show');
    };
    
    document.querySelectorAll('.color-box').forEach(box => {
        box.onclick = (e) => {
            const color = e.target.getAttribute('data-color');
            const parentId = e.target.parentElement.id;
            applyColor(parentId === 'pickerSofas' ? objSofas : objExterno, color);
        };
    });

    document.getElementById('customSofas').oninput = (e) => applyColor(objSofas, e.target.value);
    document.getElementById('customExterno').oninput = (e) => applyColor(objExterno, e.target.value);
    
    document.getElementById('toggleBg').onclick = () => {
      isDark = !isDark;
      scene.background.set(isDark ? DARK_BG : LIGHT_BG);
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    window.onresize = () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    };
    animate();
  </script>
</body>
</html>
